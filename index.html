<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perspective Library</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rye&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --surface: #0a0a0a;
      --surface2: #111;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --muted: #666;
      --accent: #e8e8e8;
      --accent-dim: rgba(255,255,255,0.05);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* AUTH */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-box { width: 100%; max-width: 380px; }
    .auth-header { text-align: center; margin-bottom: 36px; }
    .auth-logo { display: block; margin: 0 auto 18px; width: 100%; max-width: 340px; }
    .auth-logo img { width: 100%; height: auto; display: block; }
    .auth-title { font-family: 'Rye', serif; font-size: 24px; color: var(--text); letter-spacing: 0.02em; }
    .auth-sub { margin-top: 6px; font-size: 12px; color: var(--muted); letter-spacing: 0.04em; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; }

    .btn-google {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      background: #fff; color: #1a1a1a; border: none; border-radius: 12px; padding: 12px;
      font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      box-shadow: 0 1px 6px rgba(0,0,0,0.3); letter-spacing: 0.02em;
    }
    .btn-google:hover { background: #f5f5f5; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
    .btn-google svg { flex-shrink: 0; }

    .divider {
      display: flex; align-items: center; gap: 12px; margin: 22px 0;
      color: var(--muted); font-size: 11px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .field input {
      width: 100%; background: #050505; border: 1px solid var(--border); border-radius: 10px;
      padding: 11px 14px; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .field input::placeholder { color: #444; }
    .field input:focus { border-color: rgba(255,255,255,0.3); box-shadow: 0 0 0 3px rgba(255,255,255,0.05); }

    .btn-enter {
      width: 100%; background: #f0f0f0; color: #0f0f0f; border: none; border-radius: 12px;
      padding: 13px; font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s; margin-top: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4); letter-spacing: 0.03em;
    }
    .btn-enter:hover { opacity: 0.9; }
    .btn-enter:active { transform: scale(0.99); }
    .btn-enter:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #f87171;
      margin-top: 14px; display: none;
    }

    /* LIBRARY */
    #library-screen { display: none; min-height: 100vh; }

    .lib-header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .lib-brand { display: flex; align-items: center; gap: 10px; font-family: 'Rye', serif; font-size: 15px; color: var(--text); letter-spacing: 0.02em; }
    .lib-brand-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; }
    .lib-right { display: flex; align-items: center; gap: 16px; }
    .user-pill { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: #333;
      border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 700; color: #fff; overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .btn-signout {
      background: none; border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px;
      font-family: 'Inter', sans-serif; font-size: 11px; color: var(--muted); cursor: pointer;
      transition: color 0.15s, border-color 0.15s; letter-spacing: 0.02em;
    }
    .btn-signout:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

    .lib-main { max-width: 1100px; margin: 0 auto; padding: 48px 32px; }
    .lib-heading { margin-bottom: 40px; }
    .lib-heading-eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .lib-heading h1 { font-size: 32px; color: var(--text); letter-spacing: 0.02em; }

    /* BOOK GRID */
    #book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 24px; }

    .book-card { cursor: pointer; display: flex; flex-direction: column; gap: 10px; transition: transform 0.2s; }
    .book-card:hover { transform: translateY(-4px); }

    .book-cover {
      aspect-ratio: 2/3; border-radius: 6px 12px 12px 6px; position: relative; overflow: hidden;
      box-shadow: -4px 0 0 0 rgba(0,0,0,0.4), 4px 4px 20px rgba(0,0,0,0.6), inset -3px 0 6px rgba(0,0,0,0.3);
      display: flex; flex-direction: column; justify-content: space-between; padding: 18px 14px;
    }
    .book-cover::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
      background: rgba(0,0,0,0.35); border-radius: 6px 0 0 6px; z-index: 1;
    }
    .book-cover::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .book-category { position: relative; z-index: 2; font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.55); }
    .book-title-cover { position: relative; z-index: 2; font-size: 13px; line-height: 1.4; color: rgba(255,255,255,0.92); }
    .book-meta { display: flex; flex-direction: column; gap: 3px; }
    .book-title-below { font-size: 11px; color: var(--text); line-height: 1.4; }
    .book-subtitle-below { font-size: 10px; color: var(--muted); line-height: 1.4; }
    .book-readtime { font-size: 10px; color: #444; margin-top: 2px; }

    /* EMPTY STATE */
    #empty-state { display: none; text-align: center; padding: 80px 0; color: var(--muted); }
    #empty-state svg { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.3; }
    #empty-state h2 { font-size: 20px; color: #444; margin-bottom: 8px; }
    #empty-state p { font-size: 13px; color: #3a3a3a; max-width: 320px; margin: 0 auto; line-height: 1.6; }

    /* MODAL */
    #modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); padding: 24px; overflow-y: auto;
    }
    #modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      width: 100%; max-width: 680px; margin: auto; padding: 0; overflow: hidden;
      animation: modal-in 0.2s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-cover-bar { height: 6px; width: 100%; }
    .modal-header { padding: 28px 32px 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .modal-eyebrow { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .modal-title { font-size: 22px; line-height: 1.35; color: var(--text); }
    .modal-subtitle { margin-top: 8px; font-size: 15px; color: var(--muted); line-height: 1.5; font-style: italic; }
    .modal-close {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; background: var(--surface2);
      border: 1px solid var(--border); color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .modal-close:hover { color: var(--text); background: #2a2a2a; }
    .modal-divider { margin: 24px 32px 0; height: 1px; background: var(--border); }

    /* PROGRESS */
    #modal-progress-wrap { padding: 14px 32px 0; display: none; }
    #modal-progress-track { height: 3px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
    #modal-progress-fill { height: 100%; background: #e8e8e8; border-radius: 99px; width: 0%; transition: width 0.3s ease; }
    #modal-progress-text { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
    #modal-completed-text { padding: 14px 32px 0; font-size: 12px; color: #aaa; letter-spacing: 0.06em; display: none; }

    /* READING AREA */
    .modal-body {
      padding: 20px 32px 36px;
      font-size: 16px;
      line-height: 1.8;
      color: #ccc;
    }

    /* Rich content styles inside modal */
    .modal-body p {
      margin-bottom: 1.2em;
    }
    .modal-body h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin: 1.8em 0 0.6em;
      letter-spacing: 0.01em;
    }
    .modal-body h3 {
      font-size: 15px;
      font-weight: 600;
      color: #ddd;
      margin: 1.4em 0 0.5em;
      letter-spacing: 0.01em;
    }
    .modal-body strong {
      color: #e8e8e8;
      font-weight: 600;
    }
    .modal-body ul, .modal-body ol {
      padding-left: 1.4em;
      margin-bottom: 1em;
    }
    .modal-body li {
      margin-bottom: 0.4em;
    }

    /* TABLE STYLES */
    .modal-body .table-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin: 1.8em 0 0.6em;
    }
    .modal-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.4em;
      font-size: 14px;
    }
    .modal-body table th {
      background: rgba(255,255,255,0.06);
      color: #e0e0e0;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.08);
      text-align: left;
    }
    .modal-body table td {
      padding: 9px 14px;
      border: 1px solid rgba(255,255,255,0.06);
      color: #bbb;
      vertical-align: top;
    }
    .modal-body table tr:nth-child(even) td {
      background: rgba(255,255,255,0.02);
    }
    .modal-body table .td-no {
      color: #444;
      font-style: italic;
    }

    .modal-body-empty { padding: 20px 32px 36px; font-size: 14px; color: #444; font-style: italic; }

    /* LOADING */
    #loading-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .spinner { width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #ccc; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .lib-main { padding: 36px 20px; }
      .lib-header { padding: 0 20px; }
      #book-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 18px; }
      .modal-header { padding: 22px 20px 0; }
      .modal-divider { margin: 18px 20px 0; }
      #modal-progress-wrap, #modal-completed-text { padding-left: 20px; padding-right: 20px; }
      .modal-body, .modal-body-empty { padding: 16px 20px 28px; }
      .modal-title { font-size: 18px; }
      .modal-body table { font-size: 12px; }
      .modal-body table th, .modal-body table td { padding: 7px 10px; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="spinner"></div>
</div>

<!-- Auth -->
<div id="auth-screen" style="display:none">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-logo">
        <img src="logo.png" alt="Perspective Library" />
      </div>
      <div class="auth-title">Perspective Library</div>
      <div class="auth-sub">A private reading room.</div>
    </div>
    <div class="auth-card">
      <button class="btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
          <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
          <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>

</div>

<!-- Library -->
<div id="library-screen">
  <header class="lib-header">
    <div class="lib-brand">
      <div class="lib-brand-dot"></div>
      Perspective Library
    </div>
    <div class="lib-right">
      <div class="user-pill">
        <div class="user-avatar" id="user-avatar-el"></div>
        <span id="user-name-el" style="display:none"></span>
      </div>
      <button class="btn-signout" id="btn-signout">Sign out</button>
    </div>

  <main class="lib-main">
    <div class="lib-heading">
      <div class="lib-heading-eyebrow">Your Collection</div>
      <h1>The Library</h1>
    </div>
    <div id="book-grid"></div>
    <div id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <h2>The shelves are empty.</h2>
      <p>Books will appear here once they're added to the <code style="background:#1e1e1e;padding:2px 6px;border-radius:4px;font-size:11px">ARTICLES</code> array in the source code.</p>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-cover-bar" id="modal-cover-bar"></div>
    <div class="modal-header">
      <div>
        <div class="modal-eyebrow" id="modal-eyebrow"></div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" id="modal-close">&#215;</button>
    </div>
    <div class="modal-divider"></div>
    <div id="modal-progress-wrap">
      <div id="modal-progress-track">
        <div id="modal-progress-fill"></div>
      </div>
      <div id="modal-progress-text">0% completed</div>
    </div>
    <div id="modal-completed-text">Completed ✓</div>
    <div id="modal-content"></div>
  </div>
</div>

const ARTICLES = [
  {
    title: "How To Use Anger To Your Advantage",
    subtitle: "Anger is not a problem if you know what it is",
    category: "Emotions",
    color: "linear-gradient(135deg, #1a1a2e, #16213e)",
    content: `Anger is always associated with bad & evil. In our society, anger is treated as if it is a disease. And if you don't know how to use it, it is a disease. Don't worry — here we discuss anger in short, simple language, with actionable steps.

1. What is Anger?

Anger is the emotion you get when you feel something is wrong. It doesn't matter if it is actually right or wrong; if you feel it, you get angry. This can happen due to feelings of injustice, disrespect, etc.

2. What Actually Happens When You Get Angry?

When you get angry, biologically, your body starts preparing for a fight — whether it's verbal or physical.

A. Your Prefrontal Cortex Gets Suppressed

The prefrontal cortex is the front part of your brain responsible for reasoning, judgment, and impulse control. In short, your IQ drops and you become less intelligent during that period. As a result, you stop thinking logically. That's why you'll see people arguing about topics so stupid that they don't even make sense to them after they cool down.

B. Adrenaline Rush

Adrenaline dumps stress hormones into your blood, making your heart pump faster, increasing energy supply, strengthening your muscles, and raising your pain tolerance. Now you are ready to fight.

But with those things going on, you make wrong decisions — beating someone, screaming at someone, etc.

Now let's study how to use anger to your advantage. We classify anger into 2 categories: Verbal & Physical.

1. Verbal Anger

This is a comparatively lower form of anger. Verbal anger means you got angry because you want to say something to someone. For example, your friend spoiled your plan and now you feel like screaming at them. When you want to say something to someone in anger — that's verbal.

How To Use It To Your Advantage:

When you get verbal anger, grab your phone and start an audio recording. Record everything you want to say. Don't post it anywhere — just record. When you cool down, review the recording.

Because when you get angry, you say what you truly mean without hesitation. This is the clearest speech. Review it and if there is something important, note it. If not, delete the recording.

2. Physical Anger

This is the high form of anger. Here, you want to physically lash out because someone has committed a huge mistake. This happens due to adrenaline. It's easy to identify — when you want to beat someone, it's physical anger.

How To Use It To Your Advantage:

When you get physical anger, do 50 push-ups. Or do 50 squats. That's it. You have to use that energy. If you don't guide that energy, it will lead to disaster. Do any form of workout. If you want to fight, try shadow boxing.

Use anger as a nitro booster — just like in a car, it gives you a burst of power. But don't get dependent on it. Anger is a booster because it comes randomly. It is not a tool because tools stay forever, and anger doesn't.

See You.

Your Friend,
Samarth Kulkarni`

<p>A huge issue which is famously known as procrastination. This is very trending. The issue is that people have talked about it so much and from so many different angles that it has become more confusing. So, you are at the right place you need. First we will understand and then learn how to use it to our advantage instead of solving — you know that's our way.</p>

<h2>1. What is procrastination?</h2>
<p>When you need to do something but you are avoiding it and doing other things, it's procrastination. You know it already, so let's get to the next topic without wasting time.</p>

<h2>2. Why does procrastination occur?</h2>
<p>When there is something to do like work, the brain starts thinking. We are also animals and our brain also works like animals. The main work of our brain is survival. And in order to survive, we focus on present not future — because if we survive now, we will be there later. That's why the brain focuses more on immediate reward.</p>

<p>To understand procrastination, we need to stop thinking in terms of time and think in terms of energy. Read the following comparison:</p>

    <tr>
      <td>Almost No Friction</td>
      <td>Feeling of getting things done</td>
      <td class="td-no">No</td>
    </tr>
  </tbody>
</table>

<p>Noticed it? Work is taking so much and giving nothing immediately, while T.V. is taking very little and giving so much. That's why we choose it. We are designed that way. We focus more on current gains rather than long term benefits because we don't know if we will be there at the time of future benefits — but we know we are alive right now.</p>

<p>So as we have understood that our natural mechanism is focused on short term instead of long term, we will use it to our advantage. Before that, I'll tell you my story on how I learned this.</p>

<h2>My Story</h2>
<p>It was February 2025. My first video was uploaded on 16 January 2025. I used to think that I had great ability to speak in English in front of a camera. But after my first recording, I realized — it was so hard to talk in a language I never talked and do it in front of a camera. I wanted to make more videos but it was very hard and there was no reward. So I did it. Procrastination.</p>

<p>But the problem was that after doing random things for a whole day, every day, when going to bed, I felt the pain of not doing. I know you have felt it too. And it sucks.</p>

<p>So, one day, I decided to clean my cupboard because it was messy. I cleaned it in about an hour and when I was going to sleep that day, I felt that I did something. Next day, when the thought of recording came, I decided to clean my study table instead. Next day, I read 20 pages of a book. Days went by like that and I was done cleaning my whole room, reading 2 books, starting 2 new habits — just by procrastinating. (Later I did record the video, which was on this very topic.)</p>

<h2>Using Procrastination — The Steps</h2>
<p>You can take a screenshot or write this in notes. But I recommend you just use it once — you'll remember it far better.</p>

<h3>Step 1 — Find Something To Procrastinate</h3>
<p>Find something you want to do but that is very hard. Don't pick something trivially small. Something that you will do now or later but is very hard. The harder the task to procrastinate is, the more variety you get in the next step.</p>

<h3>Step 2 — Find a Productive Task That Is Comparatively Easier</h3>
<p>After deciding what to procrastinate, find tasks which are productive and comparatively easier. Examples: cleaning, organizing, walking, reading, etc. Find the one that suits you.</p>

<h3>Step 3 — Procrastinate</h3>
<p>Every day, use this framework:</p>
<p><strong>Today, I am not going to _______ (the hard thing), but instead, I will _______ (comparatively easier thing).</strong></p>
<p>For example:<br>
1. Today, I am not going to record a video, but instead, I will clean my cupboard.<br>
2. Today, I am not going to work on the project, but instead, I will organize my photos.</p>

<h2>Final Notes</h2>
<p>This technique works really well. One thing is that you do have to eventually do the hard things — I made the video after procrastinating. But using this technique is far better than just procrastinating with nothing to show for it.</p>

<p>So, Go & Procrastinate.</p>

  const provider = new firebase.auth.GoogleAuthProvider();

    await auth.signInWithPopup(provider);

// ─── Email form ───────────────────────────────────────────────────────────────
emailForm.addEventListener('submit', async e => {
  e.preventDefault();
  clearError();
  const name     = fieldName.value.trim();
  const email    = fieldEmail.value.trim();
  const password = fieldPassword.value;

  if (!email || !password) return;

  btnEnter.disabled    = true;
  btnEnter.textContent = 'Entering…';

  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (err) {
    if (
      err.code === 'auth/user-not-found' ||
      err.code === 'auth/invalid-credential' ||
      err.code === 'auth/invalid-email'
    ) {
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        if (name) await cred.user.updateProfile({ displayName: name });
      } catch (signupErr) {
        showError(friendlyError(signupErr.code));
        btnEnter.disabled    = false;
        btnEnter.textContent = 'Enter Library';
        return;
      }
    } else if (err.code === 'auth/wrong-password') {
      showError('Incorrect password.');
      btnEnter.disabled    = false;
      btnEnter.textContent = 'Enter Library';
      return;
    } else {
      showError(friendlyError(err.code));
      btnEnter.disabled    = false;
      btnEnter.textContent = 'Enter Library';
      return;
    }
  }

  btnEnter.disabled    = false;
  btnEnter.textContent = 'Enter Library';
});

// ─── Error helpers ────────────────────────────────────────────────────────────
function showError(msg) {
  authError.textContent   = msg;
  authError.style.display = 'block';
}
function clearError() {
  authError.style.display = 'none';
  authError.textContent   = '';
}
function friendlyError(code) {
  const map = {
    'auth/invalid-email':          'Please enter a valid email address.',
    'auth/user-disabled':          'This account has been disabled.',
    'auth/user-not-found':         'No account found. Check your email or sign up.',
    'auth/wrong-password':         'Incorrect password.',
    'auth/email-already-in-use':   'An account with this email already exists.',
    'auth/weak-password':          'Password must be at least 6 characters.',
    'auth/popup-closed-by-user':   'Google sign-in was cancelled.',
    'auth/network-request-failed': 'Network error. Check your connection.',
    'auth/invalid-credential':     'Incorrect email or password.',
    'auth/too-many-requests':      'Too many attempts. Try again later.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

// ─── Reading time helper ──────────────────────────────────────────────────────
function readingTime(content, isHtml) {
  if (!content) return null;
  const text = isHtml ? content.replace(/<[^>]+>/g, ' ') : content;
  const words = text.trim().split(/\s+/).length;
  const mins  = Math.max(1, Math.round(words / 200));
  return `${mins} min read`;
}

// ─── Book grid ────────────────────────────────────────────────────────────────
const DEFAULT_COLORS = [
  'linear-gradient(150deg, #1a1a1a, #3a3a3a)',
  'linear-gradient(150deg, #111, #2e2e2e)',
  'linear-gradient(150deg, #1e1e1e, #444)',
  'linear-gradient(150deg, #151515, #333)',
  'linear-gradient(150deg, #0f0f0f, #2a2a2a)',
  'linear-gradient(150deg, #1c1c1c, #3e3e3e)',
  'linear-gradient(150deg, #121212, #262626)',
  'linear-gradient(150deg, #181818, #383838)',
  'linear-gradient(150deg, #101010, #303030)',
];

function renderBooks() {
  bookGrid.innerHTML = '';

  if (ARTICLES.length === 0) {
    emptyState.style.display = 'block';
    bookGrid.style.display   = 'none';
    return;
  }

  emptyState.style.display = 'none';
  bookGrid.style.display   = 'grid';

  ARTICLES.forEach((article, i) => {
    const color = article.color || DEFAULT_COLORS[i % DEFAULT_COLORS.length];
    const rt    = readingTime(article.content, article.isHtml);

    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <div class="book-cover" style="background: ${color}">
        <div class="book-category">${article.category || ''}</div>
        <div class="book-title-cover">${article.title}</div>
      </div>
      <div class="book-meta">
        <div class="book-title-below">${article.title}</div>
        ${article.subtitle ? `<div class="book-subtitle-below">${article.subtitle}</div>` : ''}
        ${rt ? `<div class="book-readtime">${rt}</div>` : ''}
      </div>
    `;
    card.addEventListener('click', () => openModal(article, color));
    bookGrid.appendChild(card);
  });
}

// ─── Firestore helpers ────────────────────────────────────────────────────────
function sanitize(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '_');
}
function progressDocId(email, title) {
  return sanitize(email) + '_' + sanitize(title);
}
async function loadProgress(email, title) {
  try {
    const snap = await db.collection('progress').doc(progressDocId(email, title)).get();
    return snap.exists ? snap.data() : null;
  } catch { return null; }
}
async function saveProgress(email, title, percent, completed) {
  try {
    await db.collection('progress').doc(progressDocId(email, title)).set({
      email, bookTitle: title, percent, completed
    });
  } catch { /* silent */ }
}

// ─── Modal + progress tracking ────────────────────────────────────────────────
let scrollListener   = null;
let saveDebounce     = null;
let currentBookTitle = '';
let isCompleted      = false;

async function openModal(article, color) {
  currentBookTitle = article.title;
  isCompleted      = false;

  modalCoverBar.style.background = color;
  modalEyebrow.textContent       = article.category || '';
  modalTitle.textContent         = article.title    || '';
  modalSubtitle.textContent      = article.subtitle || '';
  modalSubtitle.style.display    = article.subtitle ? 'block' : 'none';

  if (article.content) {
    modalContent.className = 'modal-body';
    if (article.isHtml) {
      modalContent.innerHTML = article.content;
    } else {
      modalContent.textContent = article.content;
    }
  } else {
    modalContent.className   = 'modal-body-empty';
    modalContent.textContent = 'Book content coming soon.';
  }

  modalProgressWrap.style.display = 'none';
  modalCompletedTxt.style.display = 'none';
  modalProgressFill.style.width   = '0%';
  modalProgressText.textContent   = '0% completed';

  modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  modalOverlay.scrollTop = 0;

  if (currentUser && article.content) {
    const saved = await loadProgress(currentUser.email, article.title);
    if (saved && saved.completed) {
      isCompleted = true;
      showCompletedState();
    } else {
      showProgressBar(saved ? saved.percent || 0 : 0);
      if (saved && saved.percent > 0) {
        const totalScroll = modalOverlay.scrollHeight - modalOverlay.clientHeight;
        modalOverlay.scrollTop = (saved.percent / 100) * totalScroll;
      }
    }
  } else if (article.content) {
    showProgressBar(0);
  }

  if (article.content) {
    scrollListener = () => onModalScroll();
    modalOverlay.addEventListener('scroll', scrollListener);
  }
}

function showProgressBar(pct) {
  modalProgressWrap.style.display = 'block';
  modalCompletedTxt.style.display = 'none';
  modalProgressFill.style.width   = pct + '%';
  modalProgressText.textContent   = Math.round(pct) + '% completed';
}

function showCompletedState() {
  modalProgressWrap.style.display = 'none';
  modalCompletedTxt.style.display = 'block';
}

function onModalScroll() {
  if (isCompleted) return;
  const el    = modalOverlay;
  const total = el.scrollHeight - el.clientHeight;
  const pct   = total <= 0 ? 100 : Math.min(100, Math.round((el.scrollTop / total) * 100));

  modalProgressFill.style.width = pct + '%';
  modalProgressText.textContent = pct + '% completed';

  if (pct >= 100) {
    isCompleted = true;
    showCompletedState();
    if (currentUser) saveProgress(currentUser.email, currentBookTitle, 100, true);
    return;
  }

  if (saveDebounce) clearTimeout(saveDebounce);
  saveDebounce = setTimeout(() => {
    if (currentUser) saveProgress(currentUser.email, currentBookTitle, pct, false);
  }, 3000);
}

function closeModal() {
  modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
  if (scrollListener) {
    modalOverlay.removeEventListener('scroll', scrollListener);
    scrollListener = null;
  }
  if (saveDebounce) {
    clearTimeout(saveDebounce);
    saveDebounce = null;
  }
}

modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
